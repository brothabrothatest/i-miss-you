  </head>
    
  <body>
  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>i miss you</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sage:        #87a878;
    --sage-light:  #b5ccaa;
    --sage-dark:   #4e7040;
    --sage-pale:   #deebd6;
    --cream:       #f5f0e8;
    --text-dark:   #2f4a22;
    --text-mid:    #5a7a4a;
    --text-light:  #8aaa78;
    --yes-bg:      #5c8e3a;
    --yes-hover:   #4a7228;
    --no-color:    #8aaa78;
  }

  body {
    min-height: 100vh;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* subtle dotted texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #a0b890 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }

  /* blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 { width: 400px; height: 400px; background: #9dbf88; top: -100px; left: -80px; }
  .blob-2 { width: 320px; height: 320px; background: #b8d4a8; bottom: -80px; right: -60px; }
  .blob-3 { width: 200px; height: 200px; background: #cfe3be; top: 50%; left: 60%; }

  /* floating leaves */
  .leaf {
    position: fixed;
    font-size: 20px;
    opacity: 0;
    pointer-events: none;
    z-index: 0;
    animation: leafFloat linear infinite;
  }
  @keyframes leafFloat {
    0%   { opacity: 0; transform: translateY(110vh) rotate(0deg); }
    10%  { opacity: 0.5; }
    90%  { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-10vh) rotate(360deg); }
  }

  /* card */
  .card {
    position: relative;
    z-index: 2;
    background: rgba(255, 252, 245, 0.82);
    backdrop-filter: blur(12px);
    border: 1.5px solid rgba(135, 168, 120, 0.35);
    border-radius: 28px;
    padding: 2.5rem 2.8rem;
    max-width: 420px;
    width: 90vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    text-align: center;
    box-shadow: 0 8px 40px rgba(80, 120, 60, 0.12);
  }

  /* cat gif circle */
  .cat-wrap {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid var(--sage-light);
    background: var(--sage-pale);
    flex-shrink: 0;
    transition: border-color 0.4s;
  }
  .cat-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* headline */
  .headline {
    font-family: 'Lora', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--text-dark);
    line-height: 1.25;
    transition: all 0.3s;
  }
  .headline em {
    font-style: italic;
    color: var(--sage-dark);
  }

  .subtext {
    font-size: 15px;
    color: var(--text-mid);
    margin-top: -4px;
  }

  .no-label {
    font-size: 13px;
    color: var(--text-light);
    font-style: italic;
    min-height: 18px;
    transition: all 0.3s;
  }

  /* buttons */
  .btn-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin-top: 0.4rem;
  }

  #btn-yes {
    background: var(--yes-bg);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 13px 32px;
    font-size: 17px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, font-size 0.35s ease, padding 0.35s ease;
    box-shadow: 0 4px 14px rgba(80, 120, 50, 0.25);
  }
  #btn-yes:hover { background: var(--yes-hover); transform: scale(1.06); }
  #btn-yes:active { transform: scale(0.97); }

  #btn-no {
    background: transparent;
    color: var(--no-color);
    border: 1.5px solid var(--sage-light);
    border-radius: 50px;
    padding: 10px 22px;
    font-size: 15px;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: font-size 0.35s ease, padding 0.35s ease, opacity 0.35s ease, background 0.2s;
  }
  #btn-no:hover { background: var(--sage-pale); }

  /* yes screen */
  #yes-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0.9rem;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  #yes-screen.show { display: flex; }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }

  .yes-headline {
    font-family: 'Lora', serif;
    font-size: 30px;
    font-weight: 600;
    color: var(--text-dark);
  }
  .yes-sub {
    font-size: 15px;
    color: var(--text-mid);
    line-height: 1.6;
  }

  /* floating hearts on yes */
  .floaty {
    position: fixed;
    pointer-events: none;
    z-index: 10;
    font-size: 22px;
    animation: floatUp 2.8s ease-in forwards;
    opacity: 0;
  }
  @keyframes floatUp {
    0%   { opacity: 1;   transform: translateY(0)      rotate(0deg)   scale(1); }
    80%  { opacity: 0.6; }
    100% { opacity: 0;   transform: translateY(-55vh)  rotate(25deg)  scale(1.2); }
  }

  /* little paw stamp in corner */
  .paw-stamp {
    position: fixed;
    font-size: 32px;
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }
  .paw-stamp:nth-child(1) { top: 18px;  left: 22px;  transform: rotate(-20deg); }
  .paw-stamp:nth-child(2) { top: 18px;  right: 22px; transform: rotate(20deg); }
  .paw-stamp:nth-child(3) { bottom: 18px; left: 22px;  transform: rotate(10deg); }
  .paw-stamp:nth-child(4) { bottom: 18px; right: 22px; transform: rotate(-10deg); }
</style>
</head>
<body>

<!-- background stuff -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="paw-stamp">🐾</div>
<div class="paw-stamp">🐾</div>
<div class="paw-stamp">🐾</div>
<div class="paw-stamp">🐾</div>

<!-- card -->
<div class="card">

  <div class="cat-wrap">
    <img id="cat-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExdjNnbmcwZjF0cmRkdWQ4ZnJpcHc2NGpvOXg4NHhuZ3pudGdrYnFpayZlcD12MV9naWZzX3NlYXJjaCZjdD1n/vPzbDN4rBxuvtpSpzF/giphy.gif" alt="cute cat" />
  </div>

  <div id="ask-section">
    <p class="headline" id="headline">i miss you <em>so much</em> 🌿</p>
    <p class="subtext" id="subtext">do you miss me?</p>
    <p class="no-label" id="no-label"></p>

    <div class="btn-row">
      <button id="btn-yes" onclick="sayYes()">yes 🌸</button>
      <button id="btn-no"  onclick="sayNo()">no</button>
    </div>
  </div>

  <div id="yes-screen">
    <div class="cat-wrap" style="border-color: #7fc46a;">
      <img src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3bTh2bzZuZzU0eWFkMDNsajA0YmFlOW5uY2hsd2x1NnZ6cDJ2Nmp4NyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/KmxmoHUGPDjfQXqGgv/giphy.gif" alt="happy cat" />
    </div>
    <p class="yes-headline">YEHEY</p>
    <p class="yes-sub">I mean, lowk obvious but..<br>I miss you more 🥺🥺💚💚</p>
  </div>

</div>

<script>
  let noCount = 0;

  const headlines = [
    'i miss you <em>so much</em> 💚💜',
    'are you <em>sure</em>?? 🥺🙁🙁',
    '100% sure?',
    'the cat is <em>judging</em> you',
    'this is very rude of you',
    'the cat is crying now 😢',
    '<em>last chance</em>!! please?',
    'ok fine... (not fine)',
    'you\'re going to say yes <em>eventually</em>',
    'i\'ll wait. i have snacks.',
    'literally <em>begging</em> rn 🌿',
  ];

  const noLabels = [
    '', 'liar.', 'meanie!',
    "the cat doesn't believe you",
    '😾 ...',
    'are you sure sure?',
    'the garden is wilting',
    'my heart 💔',
    'P L E A S E',
    'fine. one last time.',
    'okay the yes button wins',
  ];

  const gifs = [
    'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExdjNnbmcwZjF0cmRkdWQ4ZnJpcHc2NGpvOXg4NHhuZ3pudGdrYnFpayZlcD12MV9naWZzX3NlYXJjaCZjdD1n/wr7oA0rSjnWuiLJOY5/giphy.gif',
    'https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3MG15ZXduMXNvbThidTJmemhrMndkZjc2cnRhc2Frd2owajVrdGw2bSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/S0Nokl7V0t4mfoYkLF/giphy.gif',
    'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExdjNnbmcwZjF0cmRkdWQ4ZnJpcHc2NGpvOXg4NHhuZ3pudGdrYnFpayZlcD12MV9naWZzX3NlYXJjaCZjdD1n/G6TgcESZt8FFk8XV7K/giphy.gif',
    'https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3MjlrOHR3cWIxNXFuMzZja3M5N3Btb25lMmI2dDZrbm5vdDk1aGkzMiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/nhdOYx0ELLJJbu7Gkw/giphy.gif',
    'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExdjNnbmcwZjF0cmRkdWQ4ZnJpcHc2NGpvOXg4NHhuZ3pudGdrYnFpayZlcD12MV9naWZzX3NlYXJjaCZjdD1n/901mxGLGQN2PyCQpoc/giphy.gif',
    'https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3a3J2czZ1b295dTYzN2swZzN5eGNzeWQ0OHloOXNkOGMzc2R5YjhscyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/vrW1WOuLpWB8s/giphy.gif',
    'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM2oyMWg1cXU2b21wYmFncXoxb3Rlc3J2NWtlbXMxb3hiaHp2YTN5eSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/M3KeQ2khSTTrFZZlRI/giphy.gif',
  ];

  function sayNo() {
    noCount++;

    const headline = document.getElementById('headline');
    const noLabel  = document.getElementById('no-label');
    const btnYes   = document.getElementById('btn-yes');
    const btnNo    = document.getElementById('btn-no');
    const catGif   = document.getElementById('cat-gif');

    const hIdx = Math.min(noCount, headlines.length - 1);
    headline.innerHTML = headlines[hIdx];

    const lIdx = Math.min(noCount, noLabels.length - 1);
    noLabel.textContent = noLabels[lIdx];

    const gIdx = Math.min(Math.floor(noCount * 0.7), gifs.length - 1);
    catGif.src = gifs[gIdx];

    // yes grows
    const curYes = parseFloat(btnYes.style.fontSize) || 17;
    const newYes = Math.min(curYes + 6, 60);
    btnYes.style.fontSize = newYes + 'px';
    const pad = 13 + noCount * 3;
    btnYes.style.padding = pad + 'px ' + (32 + noCount * 5) + 'px';

    // no shrinks
    const curNo = parseFloat(btnNo.style.fontSize) || 15;
    const newNo = Math.max(curNo - 1.5, 7);
    btnNo.style.fontSize = newNo + 'px';
    btnNo.style.opacity  = Math.max(1 - noCount * 0.09, 0.15);
    btnNo.style.padding  = Math.max(10 - noCount, 3) + 'px ' + Math.max(22 - noCount * 2, 6) + 'px';

    if (noCount >= 10) btnNo.style.display = 'none';
  }

  function sayYes() {
    document.getElementById('ask-section').style.display = 'none';
    document.getElementById('yes-screen').classList.add('show');
    spawnFloaties();
  }

  function spawnFloaties() {
    const symbols = ['💚','😛','🥳','😁','🥺','😳','👅','😼'];
    for (let i = 0; i < 22; i++) {
      setTimeout(() => {
        const el = document.createElement('span');
        el.classList.add('floaty');
        el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        el.style.left = (10 + Math.random() * 80) + 'vw';
        el.style.top  = (60 + Math.random() * 30) + 'vh';
        el.style.fontSize = (14 + Math.random() * 16) + 'px';
        el.style.animationDelay = (Math.random() * 0.6) + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3200);
      }, i * 100);
    }
  }

  // spawn background leaves
  const leafEmojis = ['🍃','🌿','💚'];
  function spawnLeaf() {
    const leaf = document.createElement('span');
    leaf.classList.add('leaf');
    leaf.textContent = leafEmojis[Math.floor(Math.random() * leafEmojis.length)];
    leaf.style.left = Math.random() * 100 + 'vw';
    leaf.style.fontSize = (12 + Math.random() * 14) + 'px';
    const dur = 8 + Math.random() * 10;
    leaf.style.animationDuration = dur + 's';
    leaf.style.animationDelay = Math.random() * 4 + 's';
    document.body.appendChild(leaf);
    setTimeout(() => leaf.remove(), (dur + 5) * 1000);
  }
  for (let i = 0; i < 10; i++) setTimeout(spawnLeaf, i * 1200);
  setInterval(spawnLeaf, 3000);
</script>
</body>
</html>
